name: Java CI with Gradle

# master 브랜치에 push나 PR이 일어날 때 이 워크플로우를 실행합니다.
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    # 깃허브가 제공하는 가상 리눅스 환경(Ubuntu)에서 실행합니다.
    runs-on: ubuntu-latest

    steps:
      # 1. 깃허브 저장소에 올린 코드를 가상 환경으로 가져옵니다.
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 가상 환경에 Java 17(OpenJDK)을 설치합니다.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle 빌드 속도를 높이기 위해 의존성 라이브러리를 캐시합니다. (Travis의 cache 기능과 동일)
      - name: Gradle Caching
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. gradlew 파일에 실행 권한을 부여합니다. (Travis의 chmod +x 와 동일)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Gradle을 이용해 프로젝트를 빌드합니다. (테스트 코드까지 함께 수행)
      - name: Build with Gradle
        run: ./gradlew clean build